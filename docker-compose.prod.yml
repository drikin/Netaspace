version: '3.8'

services:
  app:
    build: .
    container_name: backspace-fm
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PERSISTENT_DB_PATH=/app/data/persistent/production.sqlite
      - BACKUP_DIR=/app/data/backups
    volumes:
      - /opt/backspace-fm-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"